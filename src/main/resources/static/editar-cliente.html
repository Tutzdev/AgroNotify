<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente - AgroNotify</title>
    <link rel="icon" type="image/jpeg" href="logo-agropecuaria-nossos-bichos.jpg">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body data-pagina="editar-cliente">
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <a class="marca" href="dashboard.html" aria-label="Agropecuaria Nossos Bichos">
                <img class="marca-logo" src="logo-agropecuaria-nossos-bichos.jpg" alt="Agropecuaria Nossos Bichos">
            </a>

            <nav class="menu" aria-label="Navegação principal">
                <a href="dashboard.html">Dashboard</a>
                <a class="ativo" href="clientes.html">Clientes</a>
                <a href="novo-cliente.html">Novo Cliente</a>
                <button class="menu-sair" type="button" id="logoutBtn">Sair</button>
            </nav>
        </div>
    </header>

    <main class="conteudo">
        <div class="titulo-pagina">
            <div>
                <h1>Editar Cliente</h1>
                <p>Atualize os dados do cliente selecionado.</p>
            </div>
        </div>

        <section class="painel formulario-painel">
            <form id="editarClienteForm">
                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" required>
                </div>

                <div class="campo">
                    <label for="produto">Produto</label>
                    <input type="text" id="produto" name="produto" required>
                </div>

                <div class="campo">
                    <label for="dataEnvio">Data de envio</label>
                    <input type="date" id="dataEnvio" name="dataEnvio" required>
                </div>

                <div class="campo">
                    <label for="mensagemCliente">Mensagem</label>
                    <textarea id="mensagemCliente" name="mensagemCliente" rows="5" required></textarea>
                </div>

                <div class="acoes-formulario">
                    <button class="botao botao-principal" type="submit">Salvar alterações</button>
                    <a class="botao botao-secundario" href="clientes.html">Cancelar</a>
                </div>
            </form>

            <p id="mensagem" class="mensagem"></p>
        </section>
    </main>
</body>
</html>
