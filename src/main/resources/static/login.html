<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgroNotify</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="pagina-login" data-pagina="login">
    <main class="login-container">
        <section class="login-card">
            <div class="login-marca">
                <span class="marca-simbolo">A</span>
                <h1>AgroNotify</h1>
            </div>

            <p class="texto-secundario">Entre para acessar o sistema.</p>

            <form id="loginForm">
                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <button class="botao botao-principal botao-largo" type="submit">Entrar</button>
            </form>

            <p id="mensagem" class="mensagem"></p>
        </section>
    </main>
</body>
</html>
